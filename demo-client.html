<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开放API演示 - CampusTrade</title>
  <style>
    body { font-family: 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f7fa; margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { text-align: center; color: #409eff; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
    .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); overflow: hidden; transition: transform 0.2s; }
    .card:hover { transform: translateY(-4px); }
    .card img { width: 100%; height: 180px; object-fit: cover; }
    .card-body { padding: 16px; }
    .title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .desc { color: #666; font-size: 14px; margin-bottom: 12px; }
    .price { font-size: 20px; color: #f56c6c; font-weight: bold; }
    .original { text-decoration: line-through; color: #999; margin-left: 8px; font-size: 14px; }
    .meta { display: flex; justify-content: space-between; margin-top: 10px; color: #999; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 CampusTrade 开放商品接口演示</h1>
    <p style="text-align:center;color:#666">直接调用 /api/products?limit=6，展示最新6件在售商品</p>
    <div class="grid" id="product-grid">加载中...</div>
  </div>
  <script>
    // 独立演示页面，通过 fetch 调用后端 API
    const baseURL = '/api';
    fetch(`${baseURL}/products?limit=6`)
      .then(res => res.json())
      .then(data => {
        const grid = document.getElementById('product-grid');
        if (!data.products || data.products.length === 0) {
          grid.innerHTML = '<p>暂无商品</p>';
          return;
        }
        grid.innerHTML = data.products.map(p => `
          <div class="card">
            <img src="${p.images?.[0] || '/uploads/placeholder.jpg'}" alt="${p.title}">
            <div class="card-body">
              <div class="title">${p.title}</div>
              <div class="desc">${p.description}</div>
              <div class="price">¥${p.price}<span class="original">¥${p.originalPrice}</span></div>
              <div class="meta">
                <span>${p.sellerNickname}</span>
                <span>${new Date(p.createdAt).toLocaleDateString()}</span>
              </div>
            </div>
          </div>
        `).join('');
      })
      .catch(err => {
        document.getElementById('product-grid').innerText = '请求失败，请确保后端已启动';
        console.error(err);
      });
  </script>
</body>
</html>
