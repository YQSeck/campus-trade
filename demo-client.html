<!DOCTYPE html>
<!-- 【模块六：开放 API】第三方调用示例页面 -->
<!-- AI 生成：手动调整前请勿修改 -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开放API演示 - CampusTrade</title>
  <style>
    body { font-family: 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f7fa; margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { text-align: center; color: #409eff; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
    .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); overflow: hidden; transition: transform 0.2s; }
    .card:hover { transform: translateY(-4px); }
    .card img { width: 100%; height: 180px; object-fit: cover; background: #f0f2f5; }
    .card-body { padding: 16px; }
    .title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .desc { color: #666; font-size: 14px; margin-bottom: 12px; }
    .price { font-size: 20px; color: #f56c6c; font-weight: bold; }
    .original { text-decoration: line-through; color: #999; margin-left: 8px; font-size: 14px; }
    .meta { display: flex; justify-content: space-between; margin-top: 10px; color: #999; font-size: 13px; }
    .status { text-align: center; padding: 40px; color: #999; }
    .error { color: #f56c6c; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 CampusTrade 开放商品接口演示</h1>
    <p style="text-align:center;color:#666">
      第三方调用 <code>GET /api/products</code>，展示在售商品
    </p>
    <div class="grid" id="product-grid">
      <div class="status">⏳ 加载中...</div>
    </div>
  </div>
  <script>
    // 模块六：开放 API 第三方调用示例
    // 注意：第三方调用必须携带 x-api-key 头
    const API_KEY = 'campus-trade-2026-public';
    const baseURL = 'http://localhost:3000/api';

    fetch(`${baseURL}/products`, {
      headers: {
        'x-api-key': API_KEY
      }
    })
      .then(res => {
        if (!res.ok) {
          return res.json().then(err => { throw new Error(err.message || '请求失败'); });
        }
        return res.json();
      })
      .then(data => {
        const grid = document.getElementById('product-grid');
        if (!data.products || data.products.length === 0) {
          grid.innerHTML = '<div class="status">暂无商品</div>';
          return;
        }
        grid.innerHTML = data.products.map(p => `
          <div class="card">
            <img src="${p.images?.[0] || ''}" alt="${p.title}" onerror="this.style.display='none'">
            <div class="card-body">
              <div class="title">${p.title}</div>
              <div class="desc">${p.description}</div>
              <div class="price">¥${p.price}${p.originalPrice ? `<span class="original">¥${p.originalPrice}</span>` : ''}</div>
              <div class="meta">
                <span>${p.sellerNickname || '未知卖家'}</span>
                <span>${p.createdAt ? new Date(p.createdAt).toLocaleDateString() : ''}</span>
              </div>
            </div>
          </div>
        `).join('');
      })
      .catch(err => {
        document.getElementById('product-grid').innerHTML = `
          <div class="status error">❌ 请求失败：${err.message}<br>
          <span style="font-size:13px;">请确保后端已启动（node server/index.js）</span></div>
        `;
        console.error(err);
      });
  </script>
</body>
</html>
